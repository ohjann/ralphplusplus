<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/ralph-portrait-tnuqw5JI.png" />
    <title>Ralph Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet">
    <script>
      // Resolve theme pre-hydration so the background doesn't flash the
      // wrong color on first paint. Applies the persisted palette's
      // --page/--bg/--fg values directly so the main card shows through
      // on the correct base before the JS bundle loads.
      (function () {
        const saved = localStorage.getItem('ralph.theme');
        const mode = saved || 'system';
        const mql = window.matchMedia('(prefers-color-scheme: dark)');
        const resolved = mode === 'system' ? (mql.matches ? 'dark' : 'light') : mode;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themeMode = mode;
        try {
          var p = localStorage.getItem('ralph.palette');
          var fallback = {
            light: { '--page': '#faf4ed', '--bg': '#faf4ed', '--bg-card': '#fffaf3', '--fg': '#575279' },
            dark:  { '--page': '#191724', '--bg': '#191724', '--bg-card': '#1f1d2e', '--fg': '#e0def4' },
          };
          var vars = fallback[resolved];
          for (var k in vars) document.documentElement.style.setProperty(k, vars[k]);
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-c-hZdXAg.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CnN9WRYf.css">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
